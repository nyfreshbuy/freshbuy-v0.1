<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>自提点管理 - 在鲜购拼好货后台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/admin.css" />
  </head>

  <body data-page="pickups">
    <div class="admin-layout">
      <aside class="admin-sidebar">
      <!-- ✅ 统一 sidebar：由 /admin/assets/js/admin_sidebar.js 注入 -->
      <div id="adminSidebar"></div>
    </aside>
      <div class="admin-main">
        <header class="admin-topbar">
          <button class="admin-btn admin-btn-ghost" data-toggle-sidebar>☰</button>
          <div class="admin-topbar-title">自提点管理</div>
          <div class="admin-topbar-spacer"></div>

          <div class="admin-search">
            <span class="admin-search-icon">🔍</span>
            <input type="text" placeholder="搜索自提点 / 地址..." />
          </div>

          <div class="admin-user">
            <div class="admin-user-avatar">A</div>
            <div class="admin-user-info">
              <span class="admin-user-name">Admin</span>
              <span class="admin-user-role">超级管理员</span>
            </div>
          </div>
        </header>

        <main class="admin-content">
          <div class="admin-page-header">
            <div>
              <div class="admin-page-title">自提点列表</div>
              <div class="admin-breadcrumb">后台 &gt; 自提点管理</div>
            </div>
            <div class="admin-page-actions">
              <button class="admin-btn admin-btn-ghost">⟳ 刷新</button>
              <button class="admin-btn admin-btn-primary">＋ 新增自提点</button>
            </div>
          </div>

          <section class="admin-grid">
  <article class="admin-card admin-card-ghost">
    <div class="admin-card-title">自提点数量</div>
    <div id="pickupTotalCount" class="admin-card-value">0</div>
    <div id="pickupTotalSub" class="admin-card-sub">加载中...</div>
  </article>

  <article class="admin-card admin-card-ghost">
    <div class="admin-card-title">启用自提点</div>
    <div id="pickupActiveCount" class="admin-card-value">0</div>
    <div class="admin-card-sub">当前可用自提点</div>
  </article>

  <article class="admin-card admin-card-ghost">
    <div class="admin-card-title">最新自提点</div>
    <div id="pickupLatestName" class="admin-card-value">-</div>
    <div id="pickupLatestSub" class="admin-card-sub">加载中...</div>
  </article>

  <article class="admin-card admin-card-ghost">
    <div class="admin-card-title">待开通自提点</div>
    <div id="pickupPendingCount" class="admin-card-value">0</div>
    <div class="admin-card-sub">审核中的团长申请</div>
  </article>
</section>

          <section class="admin-table-card" style="margin-top: 12px">
            <div class="admin-card-header">
              <div>
                <div class="admin-card-header-title">自提点列表</div>
                <div class="admin-card-header-sub">
                  后续对接 /api/admin/pickups · 绑定团长 / 配送时间段 / 地址坐标。
                </div>
              </div>
            </div>

            <div class="admin-table-wrapper">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>自提点ID</th>
                    <th>名称</th>
                    <th>绑定团长</th>
                    <th>地址</th>
                    <th>开放时间</th>
                    <th>本周订单</th>
                    <th>状态</th>
                  </tr>
                </thead>
                <tbody id="pickupTableBody">
  <tr>
    <td colspan="7" style="text-align:center;padding:20px;color:#999;">加载中...</td>
  </tr>
</tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script src="/admin/assets/js/admin_guard.js"></script>
    <script src="./assets/js/admin_auth_ui.js"></script>
    <!-- ✅ 统一 sidebar 注入脚本（必须加） -->
    <script src="/admin/assets/js/admin_sidebar.js"></script>
    <script src="assets/js/admin.js"></script>
    <script src="/admin/assets/js/pickups.js"></script>
  </body>
</html>
