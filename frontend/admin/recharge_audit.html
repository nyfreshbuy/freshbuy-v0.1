<!-- FILE: frontend/admin/recharge_audit.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Zelle 充值审核 - Freshbuy Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- ✅ 后台统一样式（包含 sidebar 样式） -->
  <link rel="stylesheet" href="/admin/assets/css/admin.css" />

  <style>
    body { margin:0; background:#f3f4f6; }

    /* ===============================
       ✅ Sidebar Layout Fix
       - admin_sidebar.js 会注入 #adminSidebar
       - sidebar 默认宽度 240px
    =============================== */
    #adminSidebar{
      position: fixed;
      left: 0;
      top: 0;
      width: 240px;
      height: 100vh;
      overflow: auto;
      z-index: 9999;
    }

    /* ✅ 主内容给 sidebar 留位置 */
    .admin-main { margin-left: 240px; }

    /* ✅ 手机端：sidebar 不固定，不留左边空 */
    @media (max-width: 768px) {
      #adminSidebar{
        position: static;
        width: auto;
        height: auto;
      }
      .admin-main { margin-left: 0; }
    }

    .wrap{ max-width: 980px; margin: 20px auto; padding: 0 14px 60px; }
    .card{ background:#fff; border-radius:16px; box-shadow:0 6px 20px rgba(0,0,0,.08); padding:16px; }
    .title{
      font-size:18px; font-weight:800; color:#111827; margin-bottom:12px;
      display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap;
    }
    .btn{ border:0; border-radius:12px; padding:10px 12px; cursor:pointer; font-weight:800; }
    .btn-ghost{ background:#eef2ff; color:#111827; }
    table{ width:100%; border-collapse:collapse; font-size:14px; }
    th,td{ padding:10px 8px; border-bottom:1px solid #f1f5f9; vertical-align:top; }
    th{ text-align:left; color:#475569; font-size:12px; }
    .actions{ display:flex; gap:8px; flex-wrap:wrap; }
    .btn-ok{ background:#22c55e; color:#fff; }
    .btn-no{ background:#ef4444; color:#fff; }
    .muted{ color:#64748b; font-size:12px; }
    .remark{ white-space:pre-wrap; max-width:420px; }
    .topbar{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    input.note{ padding:9px 10px; border:1px solid #e5e7eb; border-radius:12px; width:260px; }
    .badge{ display:inline-block; padding:4px 8px; border-radius:999px; background:#f1f5f9; font-size:12px; color:#0f172a; }
  </style>
</head>

<body>
  <!-- ✅ 必须：sidebar 注入容器 -->
  <div id="adminSidebar"></div>

  <!-- ✅ 主内容：让出 sidebar 的区域 -->
  <main class="admin-main">
    <div class="wrap">
      <div class="card">
        <div class="title">
          <div>💸 Zelle 充值审核（Pending） <span class="badge" id="countBadge">0</span></div>
          <div class="topbar">
            <input class="note" id="adminNote" placeholder="备注（可选，例如：已到账 1/25）" />
            <button class="btn btn-ghost" id="btnRefresh">刷新</button>
          </div>
        </div>

        <div class="muted" id="statusText">加载中…</div>

        <div style="overflow:auto; margin-top:10px;">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>用户</th>
                <th>金额</th>
                <th>备注（ref/memo）</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

<script>
  // ✅ 管理员 token 兜底（按你项目可能的 key 来）
  function getAdminToken(){
    return (
      localStorage.getItem("admin_token") ||
      localStorage.getItem("adminToken") ||
      localStorage.getItem("token") ||
      ""
    );
  }

  function fmtTime(s){
    try { return new Date(s).toLocaleString(); } catch(e){ return String(s||""); }
  }

  function esc(s){
    return String(s ?? "").replace(/[<>&"]/g, (c) => ({
      "<":"&lt;", ">":"&gt;", "&":"&amp;", '"':"&quot;"
    }[c]));
  }

  async function api(url, opts={}){
    const token = getAdminToken();
    const headers = Object.assign(
      { "Content-Type":"application/json" },
      opts.headers || {},
      token ? { Authorization: "Bearer " + token } : {}
    );
    const res = await fetch(url, Object.assign({}, opts, { headers }));
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.message || ("HTTP " + res.status));
    return data;
  }

  const tbody = document.getElementById("tbody");
  const statusText = document.getElementById("statusText");
  const adminNote = document.getElementById("adminNote");
  const countBadge = document.getElementById("countBadge");

  // ✅ 二次确认：防误点（输入 CONFIRM 才执行）
  function strongConfirm(action, amount){
    const tip = action === "approve"
      ? `确认要【通过入账】 $${amount.toFixed(2)} 吗？\n为防误点，请输入：CONFIRM`
      : `确认要【拒绝】 $${amount.toFixed(2)} 吗？\n为防误点，请输入：CONFIRM`;
    const v = prompt(tip, "");
    return (v || "").trim().toUpperCase() === "CONFIRM";
  }

  async function load(){
    statusText.textContent = "加载中…";
    tbody.innerHTML = "";
    countBadge.textContent = "0";

    try{
      const data = await api("/api/admin/recharge/pending?limit=200");
      const items = data.items || [];

      countBadge.textContent = String(items.length);
      statusText.textContent = "共 " + items.length + " 条 pending";

      if(items.length === 0){
        tbody.innerHTML = '<tr><td colspan="5" class="muted">暂无 pending</td></tr>';
        return;
      }

      tbody.innerHTML = items.map(r => {
        const rid = r._id || r.id || "";
        const u = r.userId || {};
        const userLine = (u.name || "") + (u.phone ? (" / " + u.phone) : "");
        const userIdText = (u._id || r.userId || "");
        const amt = Number(r.amount || 0);
        const remark = esc(r.remark || "");

        return `
          <tr data-id="${esc(rid)}" data-amt="${esc(String(amt))}">
            <td>${fmtTime(r.createdAt)}</td>
            <td>
              <div>${esc(userLine || String(userIdText || ""))}</div>
              <div class="muted">${esc(String(userIdText || ""))}</div>
            </td>
            <td><b>$${amt.toFixed(2)}</b></td>
            <td class="remark">${remark}</td>
            <td>
              <div class="actions">
                <button class="btn btn-ok" data-act="approve">通过入账</button>
                <button class="btn btn-no" data-act="reject">拒绝</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");

    }catch(e){
      statusText.textContent = "加载失败：" + (e.message || "error");
      tbody.innerHTML = '<tr><td colspan="5" class="muted">加载失败</td></tr>';
    }
  }

  tbody.addEventListener("click", async (ev) => {
    const btn = ev.target.closest("button[data-act]");
    if(!btn) return;

    const tr = ev.target.closest("tr[data-id]");
    const id = tr?.dataset?.id;
    if(!id) return;

    const act = btn.dataset.act;
    const amount = Number(tr.dataset.amt || 0) || 0;

    if(!strongConfirm(act, amount)) return;

    const note = (adminNote.value || "").trim();

    btn.disabled = true;
    const old = btn.textContent;
    btn.textContent = "处理中…";

    try{
      const url =
        act === "approve"
          ? ("/api/admin/recharge/" + encodeURIComponent(id) + "/approve")
          : ("/api/admin/recharge/" + encodeURIComponent(id) + "/reject");

      await api(url, { method:"POST", body: JSON.stringify({ note }) });
      await load();
    }catch(e){
      alert(e.message || "操作失败");
      btn.disabled = false;
      btn.textContent = old;
    }
  });

  document.getElementById("btnRefresh").addEventListener("click", load);
  load();
</script>

<!-- ✅ 最后加载：sidebar 注入脚本（建议加版本号，避免缓存） -->
<script src="/admin/assets/js/admin_sidebar.js?v=20260227_1"></script>
</body>
</html>
