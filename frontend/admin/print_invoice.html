<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invoice Print</title>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial; margin: 16px; color:#111827; }
    .bar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom: 12px; }
    .btn { padding:10px 14px; border-radius:10px; border:0; cursor:pointer; }
    .btn-dark{ background:#111827; color:#fff; }
    .btn-ghost{ background:#f3f4f6; }
    .card{ border:1px solid #e5e7eb; border-radius:12px; padding:14px; }
    table{ width:100%; border-collapse:collapse; margin-top:10px; }
    th,td{ border-bottom:1px solid #e5e7eb; padding:8px; font-size:13px; text-align:left; vertical-align:top;}
    .muted{ color:#6b7280; font-size:12px; }
    @media print {
      .bar { display:none; }
      body { margin: 0; }
      .card { border: none; }
    }
  </style>
</head>
<body>
  <div class="bar">
    <button class="btn btn-dark" id="btnPrint">打印</button>
    <button class="btn btn-ghost" id="btnClose">关闭</button>
    <span class="muted" id="hint"></span>
  </div>

  <div class="card" id="root">加载中…</div>

  <script src="/admin/assets/js/print_invoice.js?v=20260224_1"></script>
</body>
</html>
