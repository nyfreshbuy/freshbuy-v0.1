<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>库存净资产 - Freshbuy Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="/admin/assets/css/admin.css" />

  <style>
    body {
      margin: 0;
      background: #0b1020;
      color: #e5e7eb;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Noto Sans SC", sans-serif;
    }

    .admin-layout {
      display: flex;
      min-height: 100vh;
    }

    .admin-sidebar-wrap {
      width: 260px;
      min-width: 260px;
      background: #111827;
      border-right: 1px solid rgba(255,255,255,.06);
    }

    .admin-main {
      flex: 1;
      min-width: 0;
      padding: 22px;
      background:
        radial-gradient(circle at top right, rgba(16,185,129,.14), transparent 24%),
        radial-gradient(circle at top left, rgba(59,130,246,.10), transparent 18%),
        #0b1020;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: .3px;
    }

    .page-sub {
      margin-top: 6px;
      color: #94a3b8;
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: rgba(17,24,39,.88);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.10);
      background: #0f172a;
      color: #e5e7eb;
      padding: 0 12px;
      outline: none;
    }

    .toolbar input {
      min-width: 240px;
    }

    .toolbar button {
      cursor: pointer;
      background: linear-gradient(135deg, #059669, #047857);
      border: none;
      font-weight: 800;
      padding: 0 18px;
      box-shadow: 0 10px 20px rgba(5,150,105,.25);
    }

    .toolbar button:hover {
      transform: translateY(-1px);
    }

    .toolbar .btn-secondary {
      background: #111827;
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(16,185,129,.12);
      color: #6ee7b7;
      border: 1px solid rgba(16,185,129,.20);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .kpi-card {
      background: rgba(17,24,39,.92);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.20);
      min-height: 112px;
    }

    .kpi-label {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
      word-break: break-word;
    }

    .kpi-sub {
      margin-top: 10px;
      font-size: 12px;
      color: #64748b;
    }

    .panel {
      background: rgba(17,24,39,.92);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.20);
      min-width: 0;
      margin-bottom: 18px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(2,6,23,.45);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
      background: rgba(15,23,42,.85);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td {
      color: #e5e7eb;
    }

    tr:hover td {
      background: rgba(255,255,255,.02);
    }

    .num {
      text-align: right;
      white-space: nowrap;
    }

    .empty {
      padding: 28px 14px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

    .loading {
      opacity: .7;
      pointer-events: none;
    }

    .muted {
      color: #94a3b8;
    }

    @media (max-width: 1200px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 1024px) {
      .admin-sidebar-wrap {
        display: none;
      }

      .admin-main {
        padding: 14px;
      }
    }

    @media (max-width: 640px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .page-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar input {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar-wrap">
      <div id="adminSidebar"></div>
    </aside>

    <main class="admin-main" id="inventoryAssetsPage">
      <div class="page-head">
        <div>
          <div class="page-title">库存净资产</div>
          <div class="page-sub">
            基于剩余批次库存 × 批次成本，统计当前仓库库存价值、商品库存资产排行、批次库存资产明细
          </div>
        </div>
        <div class="badge" id="summaryBadge">口径：按剩余批次成本计算</div>
      </div>

      <section class="toolbar">
        <input type="text" id="keyword" placeholder="搜索商品名 / SKU / 供应商" />
        <select id="viewMode">
          <option value="all">显示全部</option>
          <option value="products">只看商品排行</option>
          <option value="batches">只看批次明细</option>
        </select>
        <button id="btnLoad">刷新数据</button>
        <button id="btnReset" class="btn-secondary">重置</button>
      </section>

      <section class="cards">
        <div class="kpi-card">
          <div class="kpi-label">总库存件数</div>
          <div class="kpi-value" id="kpiTotalQty">0</div>
          <div class="kpi-sub">所有剩余批次件数合计</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-label">库存净资产</div>
          <div class="kpi-value" id="kpiTotalAsset">$0.00</div>
          <div class="kpi-sub">remainingUnits × finalUnitCost</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-label">在库批次数</div>
          <div class="kpi-value" id="kpiBatchCount">0</div>
          <div class="kpi-sub">remainingUnits &gt; 0 的批次</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-label">在库商品数</div>
          <div class="kpi-value" id="kpiProductCount">0</div>
          <div class="kpi-sub">当前仍有库存资产的商品</div>
        </div>
      </section>

      <section class="panel" id="productsPanel">
        <div class="panel-title">按商品库存资产排行</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:72px;">#</th>
                <th>商品</th>
                <th>SKU</th>
                <th class="num">剩余库存</th>
                <th class="num">库存资产</th>
              </tr>
            </thead>
            <tbody id="productsTbody">
              <tr><td colspan="5" class="empty">暂无数据</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel" id="batchesPanel">
        <div class="panel-title">按批次库存资产明细</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:72px;">#</th>
                <th>商品</th>
                <th>SKU</th>
                <th>批次号</th>
                <th>供应商</th>
                <th>采购日期</th>
                <th class="num">剩余库存</th>
                <th class="num">单位成本</th>
                <th class="num">库存资产</th>
              </tr>
            </thead>
            <tbody id="batchesTbody">
              <tr><td colspan="9" class="empty">暂无数据</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/admin/assets/js/admin_sidebar.js"></script>
  <script src="/admin/assets/js/inventory_assets.js?v=2"></script>
</body>
</html>
