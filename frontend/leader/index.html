<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>团长工作台 - Freshbuy</title>
  <link rel="stylesheet" href="/leader/assets/css/leader.css">
</head>

<body>

<header class="topbar">

<div class="title">Freshbuy 团长工作台</div>

<div class="topbar-right">
  <span id="leaderName"></span>
  <button id="logoutBtn" class="logout-btn">退出登录</button>
</div>

</header>

<main class="container">

  <section class="stats">
    <div class="card">
      <div class="label">今日订单</div>
      <div id="todayOrders" class="value">0</div>
    </div>

    <div class="card">
      <div class="label">待自提</div>
      <div id="pendingPickup" class="value">0</div>
    </div>

    <div class="card">
      <div class="label">本周佣金</div>
      <div id="weekCommission" class="value">$0.00</div>
    </div>

    <div class="card">
      <div class="label">累计客户</div>
      <div id="totalCustomers" class="value">0</div>
    </div>
  </section>

  <section class="section">
    <h2>待处理订单</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>订单号</th>
            <th>客户</th>
            <th>金额</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="orderList"></tbody>
      </table>
    </div>
  </section>

  <section class="section">
    <h2>今日自提</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>订单号</th>
            <th>客户</th>
            <th>自提码</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="pickupList"></tbody>
      </table>
    </div>
  </section>

</main>

<nav class="tabbar">
  <a href="/leader/index.html" class="active">首页</a>
  <a href="/leader/orders.html">订单</a>
  <a href="/leader/team.html">团队</a>
</nav>

<script src="/leader/assets/js/leader_common.js"></script>
<script src="/leader/assets/js/leader_dashboard.js"></script>

</body>
</html>
