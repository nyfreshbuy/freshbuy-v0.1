<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>团长工作台 - Freshbuy</title>
  <link rel="stylesheet" href="/leader/assets/css/leader.css">

  <style>
    .hours-editor {
      margin-top: 10px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
    }

    .hours-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .hours-toolbar button {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    .hours-toolbar button:hover {
      background: #f3f4f6;
    }

    .hours-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .edit-bh-row {
      display: grid;
      grid-template-columns: 60px 90px 130px 20px 130px;
      gap: 8px;
      align-items: center;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
    }

    .edit-bh-row .day-name {
      font-weight: 700;
    }

    .edit-bh-row select,
    .edit-bh-row input {
      height: 36px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 0 8px;
    }

    .edit-bh-row.closed-row {
      background: #f3f4f6;
      color: #999;
    }

    .edit-bh-row.closed-row input {
      opacity: 0.45;
    }

    @media (max-width: 640px) {
      .edit-bh-row {
        grid-template-columns: 50px 80px 1fr;
      }

      .edit-bh-row span {
        display: none;
      }

      .edit-bh-row .edit-close {
        grid-column: 3;
      }
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="title">Freshbuy 团长工作台</div>

  <div class="topbar-right">
    <span id="leaderName"></span>
    <button id="logoutBtn" class="logout-btn">退出登录</button>
  </div>
</header>

<main class="container">

  <section class="stats">
    <div class="card">
      <div class="label">今日订单</div>
      <div id="todayOrders" class="value">0</div>
    </div>

    <div class="card">
      <div class="label">待自提</div>
      <div id="pendingPickup" class="value">0</div>
    </div>

    <div class="card">
      <div class="label">本周佣金</div>
      <div id="weekCommission" class="value">$0.00</div>
    </div>

    <div class="card">
      <div class="label">累计客户</div>
      <div id="totalCustomers" class="value">0</div>
    </div>
  </section>

  <section class="section">
    <h2>待处理订单</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>订单号</th>
            <th>客户</th>
            <th>金额</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="orderList"></tbody>
      </table>
    </div>
  </section>

  <section class="section">
    <h2>今日自提</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>订单号</th>
            <th>客户</th>
            <th>自提码</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="pickupList"></tbody>
      </table>
    </div>
  </section>

  <section class="section">
    <h2>我的自提点</h2>
    <div id="pickupPointList" class="pickup-point-list"></div>

    <div id="pickupEditor" style="display:none;margin-top:20px;" class="card">
      <input type="hidden" id="edit_id">

      <div class="leader-form-grid">
        <input id="edit_name" placeholder="自提点名字（需审核）">
        <input id="edit_contactName" placeholder="联系人">
        <input id="edit_contactPhone" placeholder="电话">

        <input id="edit_addressLine1" placeholder="地址1（需审核）">
        <input id="edit_city" placeholder="城市">
        <input id="edit_zip" placeholder="ZIP">
      </div>

      <div style="margin-top:12px;font-weight:700;">营业时间</div>

      <div class="hours-editor">
        <div class="hours-toolbar">
          <button type="button" id="copyFirstDayBtn">复制周一到全部</button>
          <button type="button" id="setAllOpenBtn">全部营业</button>
          <button type="button" id="setAllClosedBtn">全部休息</button>
        </div>

        <div id="editBusinessHours" class="hours-list">

          <div class="edit-bh-row" data-day="1">
            <div class="day-name">周一</div>
            <select class="edit-status">
              <option value="open">营业</option>
              <option value="closed">休息</option>
            </select>
            <input type="time" class="edit-open">
            <span>-</span>
            <input type="time" class="edit-close">
          </div>

          <div class="edit-bh-row" data-day="2">
            <div class="day-name">周二</div>
            <select class="edit-status">
              <option value="open">营业</option>
              <option value="closed">休息</option>
            </select>
            <input type="time" class="edit-open">
            <span>-</span>
            <input type="time" class="edit-close">
          </div>

          <div class="edit-bh-row" data-day="3">
            <div class="day-name">周三</div>
            <select class="edit-status">
              <option value="open">营业</option>
              <option value="closed">休息</option>
            </select>
            <input type="time" class="edit-open">
            <span>-</span>
            <input type="time" class="edit-close">
          </div>

          <div class="edit-bh-row" data-day="4">
            <div class="day-name">周四</div>
            <select class="edit-status">
              <option value="open">营业</option>
              <option value="closed">休息</option>
            </select>
            <input type="time" class="edit-open">
            <span>-</span>
            <input type="time" class="edit-close">
          </div>

          <div class="edit-bh-row" data-day="5">
            <div class="day-name">周五</div>
            <select class="edit-status">
              <option value="open">营业</option>
              <option value="closed">休息</option>
            </select>
            <input type="time" class="edit-open">
            <span>-</span>
            <input type="time" class="edit-close">
          </div>

          <div class="edit-bh-row" data-day="6">
            <div class="day-name">周六</div>
            <select class="edit-status">
              <option value="open">营业</option>
              <option value="closed">休息</option>
            </select>
            <input type="time" class="edit-open">
            <span>-</span>
            <input type="time" class="edit-close">
          </div>

          <div class="edit-bh-row" data-day="0">
            <div class="day-name">周日</div>
            <select class="edit-status">
              <option value="open">营业</option>
              <option value="closed">休息</option>
            </select>
            <input type="time" class="edit-open">
            <span>-</span>
            <input type="time" class="edit-close">
          </div>

        </div>
      </div>

      <div style="margin-top:12px;">
        <button id="saveBasicBtn">保存基础信息</button>
        <button id="submitAuditBtn">提交审核</button>
      </div>
    </div>
  </section>

  <section class="section">
    <h2>新增自提点申请</h2>

    <div class="leader-form-grid">
      <input id="pp_name" placeholder="自提点名称">
      <input id="pp_contactName" placeholder="联系人">
      <input id="pp_contactPhone" placeholder="联系电话">

      <input id="pp_addressLine1" placeholder="美国地址，例如 4900 Maspeth Ave" autocomplete="off">
      <input id="pp_addressLine2" placeholder="Apt / Suite / Unit（可选）">
      <input id="pp_city" placeholder="City，例如 Maspeth">
      <input id="pp_state" placeholder="State，例如 NY">
      <input id="pp_zip" placeholder="ZIP，例如 11378">

      <input id="pp_fullAddress" placeholder="Google 标准完整地址" readonly>
      <input type="hidden" id="pp_lat">
      <input type="hidden" id="pp_lng">
      <input id="pp_displayArea" placeholder="展示区域，例如 Fresh Meadows">
      <input id="pp_nearStreet" placeholder="附近街道">
      <input id="pp_maskedAddress" placeholder="前台遮罩地址">

      <input id="pp_pickupTimeText" placeholder="营业时间简述，例如 周六 2PM-6PM">

      <div class="business-hours-box" style="grid-column: 1 / -1;">
        <div style="font-weight:700;margin:8px 0 12px;">营业时间</div>

        <div class="bh-row" data-day="1" style="display:grid;grid-template-columns:80px 100px 140px 140px;gap:10px;align-items:center;margin-bottom:8px;">
          <div>周一</div>
          <select class="bh-status">
            <option value="open" selected>open</option>
            <option value="closed">close</option>
          </select>
          <input type="time" class="bh-open" value="09:00">
          <input type="time" class="bh-close" value="18:00">
        </div>

        <div class="bh-row" data-day="2" style="display:grid;grid-template-columns:80px 100px 140px 140px;gap:10px;align-items:center;margin-bottom:8px;">
          <div>周二</div>
          <select class="bh-status">
            <option value="open" selected>open</option>
            <option value="closed">close</option>
          </select>
          <input type="time" class="bh-open" value="09:00">
          <input type="time" class="bh-close" value="18:00">
        </div>

        <div class="bh-row" data-day="3" style="display:grid;grid-template-columns:80px 100px 140px 140px;gap:10px;align-items:center;margin-bottom:8px;">
          <div>周三</div>
          <select class="bh-status">
            <option value="open" selected>open</option>
            <option value="closed">close</option>
          </select>
          <input type="time" class="bh-open" value="09:00">
          <input type="time" class="bh-close" value="18:00">
        </div>

        <div class="bh-row" data-day="4" style="display:grid;grid-template-columns:80px 100px 140px 140px;gap:10px;align-items:center;margin-bottom:8px;">
          <div>周四</div>
          <select class="bh-status">
            <option value="open" selected>open</option>
            <option value="closed">close</option>
          </select>
          <input type="time" class="bh-open" value="09:00">
          <input type="time" class="bh-close" value="18:00">
        </div>

        <div class="bh-row" data-day="5" style="display:grid;grid-template-columns:80px 100px 140px 140px;gap:10px;align-items:center;margin-bottom:8px;">
          <div>周五</div>
          <select class="bh-status">
            <option value="open" selected>open</option>
            <option value="closed">close</option>
          </select>
          <input type="time" class="bh-open" value="09:00">
          <input type="time" class="bh-close" value="18:00">
        </div>

        <div class="bh-row" data-day="6" style="display:grid;grid-template-columns:80px 100px 140px 140px;gap:10px;align-items:center;margin-bottom:8px;">
          <div>周六</div>
          <select class="bh-status">
            <option value="open" selected>open</option>
            <option value="closed">close</option>
          </select>
          <input type="time" class="bh-open" value="09:00">
          <input type="time" class="bh-close" value="18:00">
        </div>

        <div class="bh-row" data-day="0" style="display:grid;grid-template-columns:80px 100px 140px 140px;gap:10px;align-items:center;margin-bottom:8px;">
          <div>周日</div>
          <select class="bh-status">
            <option value="open" selected>open</option>
            <option value="closed">close</option>
          </select>
          <input type="time" class="bh-open" value="09:00">
          <input type="time" class="bh-close" value="18:00">
        </div>
      </div>

      <textarea id="pp_leaderRemark" placeholder="备注（可选）"></textarea>
    </div>

    <div style="margin-top:12px;">
      <button id="submitPickupPointBtn">提交审核</button>
    </div>

    <div id="pickupPointSubmitMsg" style="margin-top:10px;"></div>
  </section>

  <section class="section">
    <h2>我的申请记录</h2>
    <div id="pickupRequestList" class="pickup-point-list"></div>
  </section>
</main>

<nav class="tabbar">
  <a href="/leader/index.html" class="active">首页</a>
  <a href="/leader/orders.html">订单</a>
  <a href="/leader/team.html">团队</a>
</nav>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCFgt7ksBZeFbkPJIYTo9bhJ_5U311zOYQ&libraries=places&callback=__initPlaces"></script>
<script src="/leader/assets/js/leader_common.js?v=20260417-2"></script>
<script src="/leader/assets/js/leader_dashboard.js?v=20260417-2"></script>
</body>
</html>
